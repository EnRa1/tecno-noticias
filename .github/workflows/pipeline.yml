name: Pipeline de contenido tecno.ar

on:
  schedule:
    # Corre a las 14:00 y 18:00 hora Argentina (UTC-3) -> 17 y 21 UTC
    - cron: "0 17,21 * * *"
  workflow_dispatch: {}  # permite ejecución manual

jobs:
  generar-borradores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python pipeline.py

      - name: Subir borradores a WordPress
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: python publish_to_wordpress.py

      - name: Commitear borradores nuevos
        run: |
          git config user.name "tecno-ar-bot"
          git config user.email "bot@tecno.ar"
          git add drafts/ seen.json uploaded_to_wp.json
          git diff --staged --quiet || git commit -m "Borradores automaticos $(date +'%Y-%m-%d %H:%M')"
          git push
